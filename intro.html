<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>الحنكة - المقدمة</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="assets/css/segments/intro.css?v=12" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase.js"></script>
</head>

<body>

  <main class="introPage">

    <div class="introDecor introDecorOne"></div>
    <div class="introDecor introDecorTwo"></div>
    <div class="introDecor introDecorThree"></div>

    <section class="introShell" aria-label="إعداد اللعبة">

      <header class="introHeader">

        <div class="introTitleBox">
          <div class="introTitleGlow"></div>
          <h1 class="introTitle">الحنكة</h1>
          <div class="introTitleLine"></div>
        </div>

        <p class="introSubTitle">
          جهّز الفرق، اختر النموذج، وابدأ التحدي
        </p>

      </header>

      <section class="introSetupCard">

        <div class="introTeamsRow">

          <div class="introTeamCard introTeamCardA">
            <label for="teamANameInput">الفريق الأول</label>

            <div class="introTeamInputBox">
              <input
                id="teamANameInput"
                type="text"
                placeholder="اسم الفريق الأول"
                autocomplete="off"
                maxlength="18"
              >
            </div>
          </div>

          <div class="introTeamCard introTeamCardB">
            <label for="teamBNameInput">الفريق الثاني</label>

            <div class="introTeamInputBox">
              <input
                id="teamBNameInput"
                type="text"
                placeholder="اسم الفريق الثاني"
                autocomplete="off"
                maxlength="18"
              >
            </div>
          </div>

        </div>

        <div class="introModelCard">
          <div class="introModelText">
            <label for="introModelSelect">النموذج</label>
            <p>اختر نموذج الأسئلة المناسب للجلسة</p>
          </div>

          <div class="introModelSelectBox">
            <select id="introModelSelect">
              <option value="">جارٍ تحميل النماذج...</option>
            </select>
          </div>
        </div>

        <div class="introActions">
          <button
            type="button"
            id="startGameBtn"
            onclick="startGameFromIntro()"
          >
            بدء اللعبة
          </button>
        </div>

      </section>

    </section>

  </main>

  <div id="presenterIntroModal" class="introPresenterModal hidden">
    <div class="introPresenterModalCard">

      <button
        type="button"
        class="introPresenterModalClose"
        onclick="goToDisplayFromIntro()"
        aria-label="إغلاق"
      >
        ×
      </button>

      <div class="introPresenterModalHeader">
        <div class="introPresenterModalBadge">صفحة المقدم</div>
        <div class="introPresenterModalTitle">اربط المقدم</div>
        <div class="introPresenterModalText">
          امسح QR من جهاز المقدم، أو أدخل الكود يدويًا
        </div>
      </div>

      <div class="introPresenterContent">

        <div class="introPresenterQrBox">
          <img id="presenterIntroQr" alt="QR صفحة المقدم">
        </div>

        <div class="introPresenterInfoBox">

          <div class="presenterIntroCodeBox">
            <div class="presenterIntroCodeLabel">كود الدخول</div>
            <div id="presenterIntroCode" class="presenterIntroCodeValue">----</div>
          </div>

          <div id="presenterIntroLink" class="introPresenterLink"></div>

        </div>

      </div>

      <div class="introPresenterModalActions">
        <button
          type="button"
          class="introPresenterCopyBtn secondary"
          onclick="copyPresenterIntroLink()"
        >
          نسخ الرابط
        </button>

        <button
          type="button"
          class="introPresenterCopyBtn primary"
          onclick="goToDisplayFromIntro()"
        >
          بدء اللعبة
        </button>
      </div>

    </div>
  </div>

  <div id="gameToast" class="gameToast hidden">
    <div class="gameToastIcon">!</div>
    <div id="gameToastText" class="gameToastText"></div>
  </div>

  <script src="intro.js"></script>
</body>
</html>
