<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>الحنكة - المقدمة</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="assets/css/segments/intro.css?v=40" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase.js"></script>
</head>

<body>

  <main class="introPage">

    <div class="introBgShape introBgShapeOne"></div>
    <div class="introBgShape introBgShapeTwo"></div>
    <div class="introBgShape introBgShapeThree"></div>

    <section class="introCard" aria-label="إعداد اللعبة">

      <div class="introCardHeader">

        <div class="introMiniBadge">
          يلاااا بيينااا
        </div>

        <h1 class="introTitle">
          الحنكة
        </h1>

        <p class="introSubtitle">
          جهّز الفرق، اختر النموذج، وابدأ التحدي
        </p>

      </div>

      <div class="introFormCard">

        <div class="introTeamsGrid">

          <div class="introFieldBox">
            <label for="teamANameInput">الفريق الأول</label>

            <input
              id="teamANameInput"
              type="text"
              placeholder="اكتب اسم الفريق الأول"
              autocomplete="off"
              maxlength="18"
            >
          </div>

          <div class="introFieldBox">
            <label for="teamBNameInput">الفريق الثاني</label>

            <input
              id="teamBNameInput"
              type="text"
              placeholder="اكتب اسم الفريق الثاني"
              autocomplete="off"
              maxlength="18"
            >
          </div>

        </div>

        <div class="introFieldBox introModelBox">
          <label for="introModelSelect">النموذج</label>

          <select id="introModelSelect">
            <option value="">جارٍ تحميل النماذج...</option>
          </select>
        </div>

        <button
  type="button"
  id="startGameBtn"
  onclick="startGameFromIntro()"
>
  بدء اللعبة
</button>

      </div>

    </section>

  </main>

  <div id="presenterIntroModal" class="introPresenterModal hidden">

    <div class="introPresenterModalCard">

      <button
        type="button"
        class="introPresenterModalClose"
        onclick="goToDisplayFromIntro()"
        aria-label="إغلاق"
      >
        ×
      </button>

      <div class="introPresenterModalHeader">

        <div class="introPresenterModalBadge">
          صفحة المقدم
        </div>

        <div class="introPresenterModalTitle">
          اربط المقدم
        </div>

        <div class="introPresenterModalText">
          امسح QR من جهاز المقدم، أو أدخل الكود يدويًا
        </div>

      </div>

      <div class="introPresenterContent">

        <div class="introPresenterQrBox">
          <img id="presenterIntroQr" alt="QR صفحة المقدم">
        </div>

        <div class="introPresenterInfoBox">

          <div class="presenterIntroCodeBox">
            <div class="presenterIntroCodeLabel">
              كود الدخول
            </div>

            <div id="presenterIntroCode" class="presenterIntroCodeValue">
              ----
            </div>
          </div>

          <div id="presenterIntroLink" class="introPresenterLink"></div>

        </div>

      </div>

      <div class="introPresenterModalActions">

        <button
          type="button"
          class="introPresenterCopyBtn secondary"
          onclick="copyPresenterIntroLink()"
        >
          نسخ الرابط
        </button>

        <button
          type="button"
          class="introPresenterCopyBtn primary"
          onclick="goToDisplayFromIntro()"
        >
          بدء اللعبة
        </button>

      </div>

    </div>

  </div>

  <div id="gameToast" class="gameToast hidden">
    <div class="gameToastIcon">!</div>
    <div id="gameToastText" class="gameToastText"></div>
  </div>

  <script src="intro.js"></script>

</body>
</html>
