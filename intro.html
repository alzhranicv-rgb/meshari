<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>الحنكة - المقدمة</title>

  <link rel="stylesheet" href="styles.css?v=10000" />
  <link rel="stylesheet" href="assets/css/segments/intro.css?v=500" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase.js"></script>
</head>

<body>

  <main class="introPage">

    <section id="introCard" class="introCard" aria-label="إعداد اللعبة">

      <!-- العنوان فقط -->
      <div class="introTitleArea">
  <div class="introTopBadge">يلا بينااا</div>
  <h1 class="introTitle">الحنكة</h1>
</div>

      <!-- الإعدادات -->
      <section class="introPanel">

        <!-- أسماء الفريقين -->
        <div class="introTeamsRow">

          <div class="introLabeledField">
            <div class="introMiniLabel">الفريق الأول</div>

            <div class="introField">
              <input
                id="teamANameInput"
                type="text"
                placeholder="اسم الفريق الأول"
                autocomplete="off"
                maxlength="18"
              />
            </div>
          </div>

          <div class="introLabeledField">
            <div class="introMiniLabel">الفريق الثاني</div>

            <div class="introField">
              <input
                id="teamBNameInput"
                type="text"
                placeholder="اسم الفريق الثاني"
                autocomplete="off"
                maxlength="18"
              />
            </div>
          </div>

        </div>

        <!-- النموذج + اختيار الفقرات -->
        <section class="introTopSetupRow">

          <div class="introLabeledField introModelBox">
            <div class="introMiniLabel">النموذج</div>

            <div class="introModelRow">
              <select id="introModelSelect">
                <option value="">جارٍ تحميل النماذج...</option>
              </select>
            </div>
          </div>

          <div class="introSegmentsInfoRow" id="introSegmentsBox">

            <div class="introSegmentsTitle">
              اختيار الفقرات
            </div>

            <div
              id="introSegmentsTriggerSummary"
              class="introSegmentsSummary"
            >
              اختر النموذج أولاً
            </div>

            <div
              id="introSegmentsTriggerCounter"
              class="introSegmentsCounter"
            >
              0 / 6-10
            </div>

            <div
              id="introSegmentsCounter"
              class="introSegmentsCounterHidden"
            >
              0 / 6-10
            </div>

          </div>

        </section>

        <!-- الفقرات -->
        <section class="introSegmentsPanel">

          <div id="introSegmentsGrid" class="introSegmentsGrid">
            <div class="introSegmentsEmpty">
              اختر النموذج أولاً
            </div>
          </div>

        </section>

        <!-- زر البداية -->
        <button
          type="button"
          id="startGameBtn"
          onclick="startGameFromIntro()"
        >
          بدء اللعبة
        </button>

      </section>

    </section>

  </main>

  <!-- نافذة ربط المقدم -->
  <div id="presenterIntroModal" class="introPresenterModal hidden">

    <div class="introPresenterModalCard">

      <button
        type="button"
        class="introPresenterModalClose"
        onclick="goToDisplayFromIntro()"
        aria-label="الانتقال للعرض"
      >
        ×
      </button>

      <header class="introPresenterHeader">

        <div class="introPresenterTitle">
          اربط المقدم
        </div>

        <div class="introPresenterText">
          امسح QR أو أدخل الكود
        </div>

      </header>

      <section class="introPresenterContent">

        <div class="introPresenterQrBox">
          <img
            id="presenterIntroQr"
            alt="QR صفحة المقدم"
          />
        </div>

        <div class="introPresenterInfoBox">

          <div class="presenterIntroCodeBox">

            <div class="presenterIntroCodeLabel">
              كود الدخول
            </div>

            <div
              id="presenterIntroCode"
              class="presenterIntroCodeValue"
              onclick="copyPresenterIntroCode()"
            >
              ----
            </div>

          </div>

          <div
            id="presenterIntroLink"
            class="introPresenterLink"
          ></div>

        </div>

      </section>

      <footer class="introPresenterActions">

        <button
          type="button"
          class="introPresenterCopyBtn secondary"
          onclick="copyPresenterIntroLink()"
        >
          نسخ الرابط
        </button>

        <button
          type="button"
          class="introPresenterCopyBtn primary"
          onclick="goToDisplayFromIntro()"
        >
          بدء اللعبة
        </button>

      </footer>

    </div>

  </div>

  <!-- الإشعار -->
  <div id="gameToast" class="gameToast hidden">
    <div class="gameToastIcon">!</div>
    <div id="gameToastText" class="gameToastText"></div>
  </div>

  <script src="intro.js?v=44"></script>

</body>
</html>
