<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>الحنكة - المقدمة</title>

  <link rel="stylesheet" href="styles.css?v=10000" />
  <link rel="stylesheet" href="assets/css/segments/intro.css?v=43" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase.js"></script>
</head>

<body>

  <main class="introPage">

    <!-- خلفية الانترو -->
    <div class="introBgShape introBgShapeOne"></div>
    <div class="introBgShape introBgShapeTwo"></div>
    <div class="introBgShape introBgShapeThree"></div>

    <!-- كرت الإعداد -->
    <section class="introCard" aria-label="إعداد اللعبة">

      <header class="introCardHeader">

        <div class="introMiniBadge">
          يلاااا بيينااا
        </div>

        <h1 class="introTitle">
          الحنكة
        </h1>

        <p class="introSubtitle">
          جهّز الفرق، اختر النموذج، وابدأ التحدي
        </p>

      </header>

      <div class="introFormCard">

        <!-- أسماء الفرق -->
        <div class="introTeamsGrid">

          <div class="introFieldBox">
            <label for="teamANameInput">
              الفريق الأول
            </label>

            <input
              id="teamANameInput"
              type="text"
              placeholder="اكتب اسم الفريق الأول"
              autocomplete="off"
              maxlength="18"
            />
          </div>

          <div class="introFieldBox">
            <label for="teamBNameInput">
              الفريق الثاني
            </label>

            <input
              id="teamBNameInput"
              type="text"
              placeholder="اكتب اسم الفريق الثاني"
              autocomplete="off"
              maxlength="18"
            />
          </div>

        </div>

        <!-- النموذج + اختيار الفقرات -->
        <div class="introModelSegmentsRow">

          <!-- اختيار النموذج -->
          <div class="introFieldBox introModelBox">
            <label for="introModelSelect">
              النموذج
            </label>

            <select id="introModelSelect">
              <option value="">
                جارٍ تحميل النماذج...
              </option>
            </select>
          </div>

          <!-- اختيار الفقرات - زر يفتح نافذة -->
          <section class="introSegmentsBox introSegmentsTriggerBox" id="introSegmentsBox">

            <button
              type="button"
              class="introOpenSegmentsBtn"
              onclick="openIntroSegmentsModal()"
            >
              <div class="introOpenSegmentsText">
                <strong>اختيار الفقرات</strong>
                <span id="introSegmentsTriggerSummary">اختر النموذج أولاً</span>
              </div>

              <div class="introSegmentsCounter" id="introSegmentsTriggerCounter">
                0 / 6-10
              </div>
            </button>

          </section>

        </div>

        <!-- بدء اللعبة -->
        <button
          type="button"
          id="startGameBtn"
          onclick="startGameFromIntro()"
        >
          بدء اللعبة
        </button>

      </div>

    </section>

  </main>

  <!-- نافذة اختيار الفقرات -->
  <div id="introSegmentsModal" class="introSegmentsModal hidden">

    <div class="introSegmentsModalCard">

      <button
        type="button"
        class="introSegmentsModalClose"
        onclick="closeIntroSegmentsModal()"
        aria-label="إغلاق"
      >
        ×
      </button>

      <header class="introSegmentsModalHeader">

        <div class="introSegmentsModalBadge">
          فقرات العرض
        </div>

        <div class="introSegmentsModalTitle">
          اختيار الفقرات
        </div>

        <div class="introSegmentsModalText">
          اختر من 6 إلى 10 فقرات، والترتيب حسب ضغطك
        </div>

      </header>

      <div class="introSegmentsModalTop">

        <div class="introSegmentsCounter" id="introSegmentsCounter">
          0 / 6-10
        </div>

        <div class="introSegmentsModalHint">
          اضغط على الفقرة لاختيارها أو إلغاء اختيارها
        </div>

      </div>

      <div class="introSegmentsGrid" id="introSegmentsGrid">
        <div class="introSegmentsEmpty">
          اختر النموذج أولاً
        </div>
      </div>

      <div class="introSegmentsOrder" id="introSegmentsOrder"></div>

      <div class="introSegmentsModalActions">

        <button
          type="button"
          class="introSegmentsModalBtn secondary"
          onclick="closeIntroSegmentsModal()"
        >
          رجوع
        </button>

        <button
          type="button"
          class="introSegmentsModalBtn primary"
          onclick="closeIntroSegmentsModal()"
        >
          تم
        </button>

      </div>

    </div>

  </div>

  <!-- نافذة ربط المقدم -->
  <div id="presenterIntroModal" class="introPresenterModal hidden">

    <div class="introPresenterModalCard">

      <button
        type="button"
        class="introPresenterModalClose"
        onclick="goToDisplayFromIntro()"
        aria-label="الانتقال للعرض"
      >
        ×
      </button>

      <header class="introPresenterModalHeader">

        <div class="introPresenterModalBadge">
          صفحة المقدم
        </div>

        <div class="introPresenterModalTitle">
          اربط المقدم
        </div>

        <div class="introPresenterModalText">
          امسح QR من جهاز المقدم، أو أدخل الكود يدويًا
        </div>

      </header>

      <div class="introPresenterContent">

        <div class="introPresenterQrBox">
          <img
            id="presenterIntroQr"
            alt="QR صفحة المقدم"
          />
        </div>

        <div class="introPresenterInfoBox">

          <div class="presenterIntroCodeBox">

            <div class="presenterIntroCodeLabel">
              كود الدخول
            </div>

            <div
              id="presenterIntroCode"
              class="presenterIntroCodeValue"
              onclick="copyPresenterIntroCode()"
            >
              ----
            </div>

          </div>

          <div
            id="presenterIntroLink"
            class="introPresenterLink"
          ></div>

        </div>

      </div>

      <div class="introPresenterModalActions">

        <button
          type="button"
          class="introPresenterCopyBtn secondary"
          onclick="copyPresenterIntroLink()"
        >
          نسخ الرابط
        </button>

        <button
          type="button"
          class="introPresenterCopyBtn primary"
          onclick="goToDisplayFromIntro()"
        >
          بدء اللعبة
        </button>

      </div>

    </div>

  </div>

  <!-- التوست -->
  <div id="gameToast" class="gameToast hidden">
    <div class="gameToastIcon">!</div>
    <div id="gameToastText" class="gameToastText"></div>
  </div>

  <script src="intro.js?v=43"></script>

</body>
</html>
