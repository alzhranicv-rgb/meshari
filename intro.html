<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الحنكة - المقدمة</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="assets/css/segments/intro.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase.js"></script>
</head>
<body>

  <div class="introPage">
    <div class="introCard">

      <div class="introLogoBox">
        <div class="introBadge">يلا بينا</div>
        <h1 class="introTitle">الحنكة</h1>
        <div class="introTitleLine"></div>
        <p class="introSubTitle">حدد الفريقين والنموذج</p>
      </div>

      <div class="introForm">

        <div class="introFieldsGroup">
          <div class="introField introTeamField">
            <input
              id="teamANameInput"
              type="text"
              placeholder="اسم الفريق الأول"
              autocomplete="off"
            >
          </div>

          <div class="introField introTeamField">
            <input
              id="teamBNameInput"
              type="text"
              placeholder="اسم الفريق الثاني"
              autocomplete="off"
            >
          </div>
        </div>

        <div class="introField introModelField">
          <label for="introModelSelect">النموذج</label>
          <select id="introModelSelect">
            <option value="">جارٍ تحميل النماذج...</option>
          </select>
        </div>

        <div class="introActions introActionsRow introActionsSingle">
  <button id="startGameBtn" onclick="startGameFromIntro()">بدء اللعبة</button>
</div>

      </div>

    </div>
  </div>

  <div id="presenterIntroModal" class="introPresenterModal hidden">
    <div class="introPresenterModalCard">

      <button
  type="button"
  class="introPresenterModalClose"
  onclick="goToDisplayFromIntro()"
  aria-label="إغلاق"
>
  ×
</button>

      <div class="introPresenterModalTitle">صفحة المقدم</div>
      <div class="introPresenterModalText">امسح QR أو استخدم الكود للدخول</div>

      <div class="introPresenterQrBox">
        <img id="presenterIntroQr" alt="QR صفحة المقدم">
      </div>

      <div class="presenterIntroCodeBox">
        <div class="presenterIntroCodeLabel">كود المقدم</div>
        <div id="presenterIntroCode" class="presenterIntroCodeValue">----</div>
      </div>

      <div id="presenterIntroLink" class="introPresenterLink"></div>

      <div class="introPresenterModalActions">
        <button type="button" class="introPresenterCopyBtn" onclick="copyPresenterIntroLink()">
          نسخ الرابط
        </button>

        <button type="button" class="introPresenterCopyBtn" onclick="goToDisplayFromIntro()">
          بدء اللعبة
        </button>
      </div>

    </div>
  </div>

  <div id="gameToast" class="gameToast hidden">
    <div class="gameToastIcon">!</div>
    <div id="gameToastText" class="gameToastText"></div>
  </div>

  <script src="intro.js"></script>
</body>
</html>
