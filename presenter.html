<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة المقدم</title>
  <link rel="stylesheet" href="presenter.css" />
</head>
<body>
<div class="card" id="presenterModelCard">
  <div class="label">اختر النموذج</div>
  <select id="presenterModelSelect" onchange="setPresenterModel()">
    <option value="">اختر النموذج</option>
  </select>
</div>
  <div class="presenterPage">

    <div class="presenterHeader">
      <button class="backBtn hidden" id="presenterBackBtn" onclick="showPresenterHome()">رجوع</button>
      <h1 id="presenterTitle">لوحة المقدم</h1>
    </div>

    <div id="presenterHome" class="presenterSegments">
      <button onclick="openPresenterSegment('warmup')">التسخين</button>
      <button onclick="openPresenterSegment('top10')">Top 10</button>
      <button onclick="openPresenterSegment('auction')">فتبلة</button>
      <button onclick="openPresenterSegment('who')">من هو</button>
      <button onclick="openPresenterSegment('final')">الفاصلة</button>
      <button onclick="openPresenterSegment('archive')">الأرشيف</button>
    </div>

    <div id="presenterPanel" class="presenterPanel hidden"></div>

    <div class="presenterToast" id="presenterToast">تم الإرسال</div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="presenter.js"></script>
</body>
</html>
