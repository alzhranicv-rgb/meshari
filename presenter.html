<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة المقدم</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="presenter.css" />
</head>
<body>

  <div class="presenterPage">

    <header class="presenterHeader">
      <button
        class="presenterBack hidden"
        id="presenterBackBtn"
        onclick="presenterGoHome()"
      >
        رجوع
      </button>

      <div class="presenterHeaderText">
        <h1 id="presenterTitle">لوحة المقدم</h1>
        <p id="presenterSubtitle">اختر الفقرة وتحكم بالعرض</p>
      </div>

      <button
        class="presenterEnd hidden"
        id="presenterEndBtn"
        onclick="sendCommand('endSegment')"
      >
        إنهاء
      </button>
    </header>

    <main id="presenterHome" class="presenterHome">

      <section class="presenterSetupCard">
        <div class="presenterSetupTitle">لوحة المقدم</div>

        <div class="presenterCard">
          <div class="presenterLabel">الحالة</div>
          <div class="presenterAnswerText" id="presenterConnectionStatus">
            متصل بالعرض ✅
          </div>
        </div>

        <div class="presenterTeams">
          <button class="presenterBtn orange" id="presenterHomeTeamA">
            الفريق الأول
          </button>

          <button class="presenterBtn orange" id="presenterHomeTeamB">
            الفريق الثاني
          </button>
        </div>

        <button
          class="presenterStartBtn"
          onclick="sendCommand('toggleDisplayControls')"
        >
          إظهار / إخفاء تحكم العرض
        </button>
      </section>

      <section class="presenterSegments">
        <button onclick="openPresenterSegment('warmup')" class="presenterSegmentBtn">
          <span>التسخين</span>
        </button>

        <button onclick="openPresenterSegment('top10')" class="presenterSegmentBtn">
          <span>Top 10</span>
        </button>

        <button onclick="openPresenterSegment('auction')" class="presenterSegmentBtn">
          <span>فتبلة</span>
        </button>

        <button onclick="openPresenterSegment('who')" class="presenterSegmentBtn">
          <span>من هو</span>
        </button>

        <button onclick="openPresenterSegment('final')" class="presenterSegmentBtn">
          <span>الفاصلة</span>
        </button>

        <button onclick="openPresenterSegment('archive')" class="presenterSegmentBtn">
          <span>الأرشيف</span>
        </button>
      </section>

    </main>

    <main id="presenterPanel" class="presenterPanel hidden"></main>

    <div class="presenterToast" id="presenterToast">تم الإرسال</div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="presenter.js"></script>
</body>
</html>
