<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة المقدم</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="presenter.css" />
</head>
<body>

  <div class="presenterPage">

    <header class="presenterHeader">
      <button class="presenterBack hidden" id="presenterBackBtn" onclick="showPresenterHome()">رجوع</button>

      <div class="presenterHeaderText">
        <h1 id="presenterTitle">لوحة المقدم</h1>
        <p id="presenterSubtitle">اختر النموذج وجهّز الفريقين</p>
      </div>

      <button class="presenterEnd hidden" id="presenterEndBtn" onclick="presenterEndSegment()">إنهاء</button>
    </header>

    <main id="presenterHome" class="presenterHome">

      <section class="presenterSetupCard">
        <div class="presenterSetupTitle">تجهيز اللعبة</div>

        <div class="presenterField">
          <label for="presenterModelSelect">اختيار النموذج</label>
          <select id="presenterModelSelect" onchange="setPresenterModel()">
            <option value="">اختر النموذج</option>
          </select>
        </div>

        <div class="presenterSetupGrid">
          <div class="presenterField">
            <label for="presenterTeamAInput">اسم الفريق الأول</label>
            <input id="presenterTeamAInput" type="text" placeholder="الفريق الأول">
          </div>

          <div class="presenterField">
            <label for="presenterTeamBInput">اسم الفريق الثاني</label>
            <input id="presenterTeamBInput" type="text" placeholder="الفريق الثاني">
          </div>
        </div>

        <button class="presenterStartBtn" onclick="startPresenterSetup()">بدء لوحة المقدم</button>
      </section>

      <section id="presenterGameHome" class="presenterGameHome hidden">

        <section class="presenterHomeTopCard">
          <div class="presenterHomeTitleBox">
            <div class="presenterHomeKicker">لوحة المقدم</div>
            <div id="presenterCurrentModelName" class="presenterHomeModelName">—</div>
          </div>

          <button
            id="presenterGlobalToggleBtn"
            class="presenterGlobalToggleBtn"
            onclick="togglePresenterDisplayControlsBtn()"
          >
            👁️ إخفاء أزرار التحكم
          </button>
        </section>

        <section class="presenterSegments">
          <button onclick="openPresenterSegment('warmup')" class="presenterSegmentBtn">
            <span>التسخين</span>
          </button>

          <button onclick="openPresenterSegment('top10')" class="presenterSegmentBtn">
            <span>Top 10</span>
          </button>

          <button onclick="openPresenterSegment('auction')" class="presenterSegmentBtn">
            <span>فتبلة</span>
          </button>

          <button onclick="openPresenterSegment('who')" class="presenterSegmentBtn">
            <span>من هو</span>
          </button>

          <button onclick="openPresenterSegment('final')" class="presenterSegmentBtn">
            <span>الفاصلة</span>
          </button>

          <button onclick="openPresenterSegment('archive')" class="presenterSegmentBtn">
            <span>الأرشيف</span>
          </button>
        </section>

      </section>

    </main>

    <main id="presenterPanel" class="presenterPanel hidden"></main>

    <div class="presenterToast" id="presenterToast">تم الإرسال</div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="presenter.js"></script>
</body>
</html>
