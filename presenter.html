<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0"
  />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <title>الحنكة - لوحة المقدم</title>

  <!-- ملف تصميم المقدم فقط بدون تعارض مع العرض -->
  <link rel="stylesheet" href="presenter.css" />
</head>

<body>

  <!-- شاشة دخول المقدم -->
  <div id="presenterJoin" class="homePageShell presenterJoinShell">

    <div class="topBoard presenterTopBoard">
      <div class="titleBox presenterJoinTitleBox">
        <h1>الحنكة</h1>
        <div class="modelNameDisplay">لوحة المقدم</div>
      </div>
    </div>

    <div class="presenterJoinCard">

      <div class="presenterJoinLabel">كود الجلسة</div>

      <input
        id="joinCodeInput"
        class="presenterJoinInput"
        type="tel"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="4"
        autocomplete="one-time-code"
        placeholder="0000"
        oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4)"
        onkeydown="if(event.key === 'Enter'){ event.preventDefault(); joinGameSession(); }"
      />

      <!-- اختيار طريقة المقدم -->
      <div class="presenterModeBox">
        <div class="presenterModeLabel">طريقة الدخول</div>

        <div class="presenterModeBtns">
          <button
            type="button"
            id="presenterControlModeBtn"
            class="presenterModeBtn activePresenterMode"
            onclick="setPresenterJoinMode('control')"
          >
            تحكم بالعرض
          </button>

          <button
            type="button"
            id="presenterReaderModeBtn"
            class="presenterModeBtn"
            onclick="setPresenterJoinMode('reader')"
          >
            دليل الأسئلة
          </button>
        </div>
      </div>

      <button
        type="button"
        id="presenterJoinBtn"
        class="winnerBtn presenterJoinBtn"
        onclick="joinGameSession()"
      >
        دخول
      </button>

      <div id="presenterJoinStatus" class="presenterJoinStatus">
        أدخل الكود الظاهر في شاشة الانترو
      </div>

    </div>

  </div>

  <!-- الصفحة الرئيسية للمقدم - وضع التحكم -->
  <div id="presenterHome" class="homePageShell hidden">

    <div class="topBoard" id="presenterScoreBoard">

      <div class="teamBox" id="presenterHomeTeamABox">
        <div class="teamName" id="presenterHomeTeamA">الفريق الأول</div>
        <div class="teamScore" id="presenterHomeScoreA">0</div>
      </div>

      <div class="titleBox" id="presenterTitleBox">
        <h1 id="presenterTitle">لوحة المقدم</h1>

        <div id="presenterSubtitle" class="modelNameDisplay">
          اختر الفقرة وتحكم بالعرض
        </div>
      </div>

      <div class="teamBox" id="presenterHomeTeamBBox">
        <div class="teamName" id="presenterHomeTeamB">الفريق الثاني</div>
        <div class="teamScore" id="presenterHomeScoreB">0</div>
      </div>

    </div>

    <!-- الفقرات ترسم تلقائياً حسب النموذج المختار -->
    <div class="segmentsGrid" id="presenterSegmentsGrid"></div>

    <button
      type="button"
      id="displayControlsEyeBtn"
      class="presenterDisplayControlsBtn hideControlsMode"
      onclick="togglePresenterDisplayControls()"
    >
      إخفاء التحكم
    </button>

  </div>

  <!-- الصفحة الرئيسية للمقدم - دليل الأسئلة -->
  <div id="presenterReaderHome" class="homePageShell presenterReaderHome hidden">

    <div class="presenterReaderHeader">
      <button
        type="button"
        class="presenterReaderBackBtn"
        onclick="presenterReaderLogout()"
      >
        خروج
      </button>

      <div class="presenterReaderTitleBox">
        <h1>دليل الأسئلة</h1>
        <div id="presenterReaderSubtitle" class="modelNameDisplay">
          عرض الأسئلة والإجابات فقط
        </div>
      </div>

      <button
        type="button"
        class="presenterReaderRefreshBtn"
        onclick="renderPresenterReaderHome()"
      >
        تحديث
      </button>
    </div>

    <div class="presenterReaderNotice">
      هذا الوضع للقراءة فقط، بدون تحكم أو ربط مباشر مع العرض.
    </div>

    <div id="presenterReaderSegmentsGrid" class="presenterReaderSegmentsGrid"></div>

  </div>

  <!-- صفحة دليل الأسئلة داخل فقرة -->
  <div id="presenterReaderSegmentPage" class="homePageShell presenterReaderSegmentPage hidden">

    <div class="presenterCleanHeader presenterReaderCleanHeader">

      <button
        type="button"
        class="presenterCleanHeaderBtn presenterCleanBackBtn"
        onclick="presenterReaderGoHome()"
      >
        رجوع
      </button>

      <div class="presenterCleanHeaderTitle">
        <h1 id="presenterReaderSegmentTitle">دليل الأسئلة</h1>
      </div>

      <button
        type="button"
        class="presenterCleanHeaderBtn presenterCleanEndBtn"
        onclick="reloadPresenterReaderSegment()"
      >
        تحديث
      </button>

    </div>

    <div id="presenterReaderPanel" class="presenterReaderPanel"></div>

  </div>

  <!-- صفحة الفقرة - وضع التحكم -->
  <div id="presenterSegmentPage" class="homePageShell presenterSegmentPage hidden">

    <div class="presenterCleanHeader">

      <button
        type="button"
        class="presenterCleanHeaderBtn presenterCleanBackBtn"
        id="presenterBackBtn"
        onclick="presenterGoHome()"
      >
        رجوع
      </button>

      <div class="presenterCleanHeaderTitle">
        <h1 id="presenterSegmentTitle">الفقرة</h1>
      </div>

      <button
        type="button"
        class="presenterCleanHeaderBtn presenterCleanEndBtn"
        id="presenterEndBtn"
        onclick="sendCommand('endSegment')"
      >
        إنهاء
      </button>

    </div>

    <div id="presenterPanel" class="presenterPanel"></div>

  </div>

  <!-- Toast -->
  <div class="gameToast presenterToast hidden" id="presenterToast">
    <div class="gameToastIcon">!</div>
    <div class="gameToastText" id="presenterToastText"></div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="presenter.js"></script>

</body>
</html>
