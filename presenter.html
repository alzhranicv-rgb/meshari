<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة المقدم</title>
  <link rel="stylesheet" href="presenter.css" />
</head>
<body>

  <div class="presenterPage">
    <div class="presenterHeader">
      <h1>لوحة المقدم</h1>
      <select id="presenterSegment">
        <option value="warmup">التسخين</option>
        <option value="top10">Top 10</option>
        <option value="auction">فتبلة</option>
        <option value="who">من هو</option>
        <option value="final">الفاصلة</option>
        <option value="archive">الأرشيف</option>
      </select>
    </div>

    <div class="presenterCard">
      <label>رقم النموذج</label>
      <input id="presenterModel" type="number" value="1" />
    </div>

    <div class="presenterTeams">
      <button onclick="presenterCommand('selectTeam', { team:'A' })">الفريق A</button>
      <button onclick="presenterCommand('selectTeam', { team:'B' })">الفريق B</button>
    </div>

    <div class="presenterActions">
      <button class="gray" onclick="presenterCommand('double')">دبل</button>
      <button class="red" onclick="presenterCommand('wrong')">خطأ</button>
      <button class="green" onclick="presenterCommand('correct')">صح</button>
    </div>

    <div class="presenterCard">
      <label>فتح رقم / سؤال</label>
      <div class="presenterInline">
        <input id="presenterNumber" type="number" placeholder="رقم" />
        <button onclick="openPresenterNumber()">فتح</button>
      </div>
    </div>

    <div class="presenterActions">
      <button onclick="presenterCommand('showQuestion')">إظهار السؤال</button>
      <button onclick="presenterCommand('showAnswer')">إظهار الإجابة</button>
    </div>

    <div class="presenterToast" id="presenterToast">تم الإرسال</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="presenter.js"></script>
</body>
</html>
