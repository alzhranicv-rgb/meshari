<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الحنكة - لوحة الأسئلة</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="assets/css/segments/admin.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase.js"></script>
</head>
<body>

  <div id="adminPinScreen" class="adminPinScreen">
    <div class="adminPinCard">
      <div class="adminPinLogo">لوحة الأسئلة</div>
<div class="adminPinTitle">الحنكة</div>
<div class="adminPinSub">أدخل الرقم السري للمتابعة</div>

      <input
  id="adminPinInput"
  class="adminPinInput"
  type="tel"
  inputmode="numeric"
  pattern="[0-9]*"
  maxlength="6"
  autocomplete="one-time-code"
  placeholder="••••"
/>

      <button class="adminPinBtn" onclick="checkAdminPinFromInput()">دخول</button>
      <div id="adminPinError" class="adminPinError"></div>
    </div>
  </div>

  <div class="adminShellNew hidden" id="adminShellNew">

    <aside class="adminSidebarNew">
      <div class="adminBrandBox">
        <div class="adminBrandTitle">الحنكة</div>
        <div class="adminBrandSub">لوحة إدارة الأسئلة والنماذج</div>
        <div id="adminBrandCurrentModel" class="adminBrandCurrentModel hidden"></div>
      </div>

      <div class="adminSideCard">
        <div class="adminField">
          <label for="modelName">اسم النموذج الجديد</label>
          <input id="modelName" class="adminInput" type="text" placeholder="اكتب اسم النموذج">
        </div>

        <div class="adminField">
          <label for="modelsList">النماذج</label>
          <select id="modelsList" class="adminSelect">
            <option value="">اختر النموذج</option>
          </select>
        </div>

        <div class="adminSideActions">
          <button class="adminBtn adminBtnMango" onclick="createModel()">إنشاء نموذج</button>
          <button class="adminBtn adminBtnDark" onclick="openSelectedModel()">فتح النموذج</button>
          <button class="adminBtn adminBtnLight" onclick="renameSelectedModel()">تعديل الاسم</button>
          <button class="adminBtn adminBtnDanger" onclick="deleteSelectedModel()">حذف النموذج</button>
          <button class="adminBtn adminLogoutBtn" onclick="logoutAdminPin()">خروج </button>
        </div>
      </div>
    </aside>

    <main class="adminMainNew">
      <div id="adminTabs" class="adminTabsNew hidden">
        <button type="button" class="adminTabBtn" onclick="openAdminSegment('warmup')">التسخين</button>
        <button type="button" class="adminTabBtn" onclick="openAdminSegment('top10')">Top 10</button>
        <button type="button" class="adminTabBtn" onclick="openAdminSegment('auction')">فتبلة</button>
        <button type="button" class="adminTabBtn" onclick="openAdminSegment('who')">من هو</button>
        <button type="button" class="adminTabBtn" onclick="openAdminSegment('final')">الفاصلة</button>
        <button type="button" class="adminTabBtn" onclick="openAdminSegment('archive')">الأرشيف</button>
      </div>

      <section id="adminEditor">
        <div class="adminEmptyState">افتح نموذجًا ثم اختر الفقرة التي تريد تعديلها</div>
      </section>
    </main>

  </div>

  <div id="gameToast" class="gameToast hidden">
    <div id="gameToastText" class="gameToastText"></div>
  </div>

  <div id="printPresenterArea"></div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <script>
    const ADMIN_PIN = "9900"

    function unlockAdminPanel() {
      document.getElementById("adminPinScreen")?.classList.add("hidden")
      document.getElementById("adminShellNew")?.classList.remove("hidden")
    }

    function checkAdminPinFromInput() {
      const input = document.getElementById("adminPinInput")
      const error = document.getElementById("adminPinError")
      const pin = (input?.value || "").trim()

      if (pin === ADMIN_PIN) {
        localStorage.setItem("admin_pin_ok", "1")
        unlockAdminPanel()
        return true
      }

      if (error) error.innerText = "الرقم السري غير صحيح"

      if (input) {
        input.value = ""
        input.focus()
      }

      return false
    }

    function logoutAdminPin() {
      localStorage.removeItem("admin_pin_ok")
      location.reload()
    }

    document.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem("admin_pin_ok") === "1") {
        unlockAdminPanel()
        return
      }

      const input = document.getElementById("adminPinInput")
      if (input) {
        input.focus()
        input.addEventListener("keydown", e => {
          if (e.key === "Enter") checkAdminPinFromInput()
        })
      }
    })
  </script>

  <script src="admin.js"></script>
</body>
</html>
